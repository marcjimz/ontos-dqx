name: "Promote to QA"

on:
  push:
    branches: [main]
    paths:
      - "sql/**"
      - "contracts/**"

jobs:
  promote-qa:
    name: "ODCS Quality Gate — QA Promotion"
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Promote to QA
        uses: ./.github/actions/ontos-dqx
        with:
          environment: qa
          databricks-host: ${{ secrets.DATABRICKS_HOST }}
          databricks-token: ${{ secrets.DATABRICKS_TOKEN }}
          warehouse-id: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          ontos-base-url: ${{ secrets.ONTOS_BASE_URL }}
