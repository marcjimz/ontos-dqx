name: "Ontos DQX Quality Gate"
description: "Deploy DDL, sync ODCS contracts, and run DQX quality checks against a target environment"

inputs:
  environment:
    description: "Target environment (dev, qa, prod)"
    required: true
  databricks-host:
    description: "Databricks workspace URL"
    required: true
  databricks-token:
    description: "Databricks PAT or Service Principal token"
    required: true
  warehouse-id:
    description: "SQL Warehouse ID for query execution"
    required: true
  ontos-base-url:
    description: "Ontos application base URL"
    required: true
  deploy-seed:
    description: "Whether to deploy seed data (true/false)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Register runner IP with Databricks
      id: register-ip
      shell: bash
      env:
        DATABRICKS_HOST: ${{ inputs.databricks-host }}
        DATABRICKS_TOKEN: ${{ inputs.databricks-token }}
      run: |
        RUNNER_IP=$(curl -s https://ifconfig.me)
        echo "Runner IP: ${RUNNER_IP}"
        echo "runner_ip=${RUNNER_IP}" >> $GITHUB_OUTPUT

        # Add runner IP to workspace IP access list
        RESPONSE=$(curl -s -X POST "${DATABRICKS_HOST}/api/2.0/ip-access-lists" \
          -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{
            \"label\": \"github-actions-runner-${GITHUB_RUN_ID}\",
            \"list_type\": \"ALLOW\",
            \"ip_addresses\": [\"${RUNNER_IP}/32\"]
          }")

        LIST_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('ip_access_list',{}).get('list_id',''))" 2>/dev/null || echo "")
        echo "list_id=${LIST_ID}" >> $GITHUB_OUTPUT

        if [ -n "$LIST_ID" ]; then
          echo "Registered IP access list: ${LIST_ID}"
          # Wait for IP list to propagate
          sleep 15
        else
          echo "Warning: Could not create IP access list (may not be needed)"
          echo "Response: ${RESPONSE}"
        fi

    - name: Install Python dependencies
      shell: bash
      run: pip install -r requirements.txt

    - name: Deploy DDL to Databricks
      shell: bash
      env:
        DATABRICKS_HOST: ${{ inputs.databricks-host }}
        DATABRICKS_TOKEN: ${{ inputs.databricks-token }}
        DATABRICKS_WAREHOUSE_ID: ${{ inputs.warehouse-id }}
      run: |
        SEED_FLAG=""
        if [ "${{ inputs.deploy-seed }}" = "true" ]; then SEED_FLAG="--seed"; fi
        python scripts/deploy.py --env ${{ inputs.environment }} $SEED_FLAG

    - name: Sync ODCS contracts to Ontos
      shell: bash
      env:
        DATABRICKS_HOST: ${{ inputs.databricks-host }}
        DATABRICKS_TOKEN: ${{ inputs.databricks-token }}
        ONTOS_BASE_URL: ${{ inputs.ontos-base-url }}
      run: |
        if [ -n "${{ inputs.ontos-base-url }}" ]; then
          python scripts/sync_contracts.py --env ${{ inputs.environment }}
        else
          echo "Skipping contract sync (ONTOS_BASE_URL not configured)"
        fi

    - name: Run DQX quality gate
      shell: bash
      env:
        DATABRICKS_HOST: ${{ inputs.databricks-host }}
        DATABRICKS_TOKEN: ${{ inputs.databricks-token }}
        ONTOS_BASE_URL: ${{ inputs.ontos-base-url }}
      run: |
        if [ -n "${{ inputs.ontos-base-url }}" ]; then
          python scripts/run_dqx.py --env ${{ inputs.environment }}
        else
          echo "Skipping DQX gate (ONTOS_BASE_URL not configured)"
          echo "Verifying data deployment via SQL instead..."
          python3 -c "
        import os, sys
        sys.path.insert(0, 'scripts')
        from lib.config import load_environment
        from lib.databricks_sql import get_client, execute_sql
        env = load_environment('${{ inputs.environment }}')
        client = get_client()
        wh = env['warehouse_id']
        catalog = env['catalog']
        schema = env['schema']
        tables = ['members', 'formulary', 'claims']
        for t in tables:
            result = execute_sql(client, wh, f'SELECT COUNT(*) FROM {catalog}.{schema}.{t}')
            count = result.data_array[0][0] if result and result.data_array else '?'
            print(f'  {catalog}.{schema}.{t}: {count} rows')
        print('Deployment verified successfully')
          "
        fi

    - name: Cleanup runner IP from Databricks
      if: always()
      shell: bash
      env:
        DATABRICKS_HOST: ${{ inputs.databricks-host }}
        DATABRICKS_TOKEN: ${{ inputs.databricks-token }}
      run: |
        LIST_ID="${{ steps.register-ip.outputs.list_id }}"
        if [ -n "$LIST_ID" ]; then
          echo "Removing IP access list: ${LIST_ID}"
          curl -s -X DELETE "${DATABRICKS_HOST}/api/2.0/ip-access-lists/${LIST_ID}" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}"
          echo "Cleanup complete"
        fi
